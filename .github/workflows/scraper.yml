name: Radar Scraper

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      nicho:
        description: 'bomberos | policia-local | policia-nacional | docentes | correos  (vacío = todos)'
        required: false
        default: ''
      fuente:
        description: 'noticias | boletines | sentencias | foros  (vacío = todas)'
        required: false
        default: ''

jobs:
  scraper:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nicho:
          - bomberos
          - policia-local
          - policia-nacional
          - docentes
          - correos

    steps:
      - name: Comprobar filtro de nicho
        id: filter
        run: |
          INPUT="${{ github.event.inputs.nicho }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "${{ matrix.nicho }}" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.filter.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.filter.outputs.run == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        if: steps.filter.outputs.run == 'true'
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Ejecutar scraper — ${{ matrix.nicho }}
        if: steps.filter.outputs.run == 'true'
        run: |
          ARGS="--nicho=${{ matrix.nicho }}"
          [ -n "${{ github.event.inputs.fuente }}" ] && ARGS="$ARGS --fuente=${{ github.event.inputs.fuente }}"
          node radar-engine/index.js $ARGS
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_KEY: ${{ secrets.PUBLIC_SUPABASE_KEY }}

      - name: Rebuild Vercel — ${{ matrix.nicho }}
        if: steps.filter.outputs.run == 'true' && success()
        continue-on-error: true
        run: |
          case "${{ matrix.nicho }}" in
            bomberos)         HOOK="${{ secrets.VERCEL_HOOK_BOMBEROS }}"         ;;
            policia-local)    HOOK="${{ secrets.VERCEL_HOOK_POLICIA_LOCAL }}"    ;;
            policia-nacional) HOOK="${{ secrets.VERCEL_HOOK_POLICIA_NACIONAL }}" ;;
            docentes)         HOOK="${{ secrets.VERCEL_HOOK_DOCENTES }}"         ;;
            correos)          HOOK="${{ secrets.VERCEL_HOOK_CORREOS }}"          ;;
          esac
          [ -n "$HOOK" ] && curl -X POST "$HOOK"

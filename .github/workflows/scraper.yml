name: Radar Scraper

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      fuente:
        description: 'noticias | boletines | foros'
        required: false
        default: 'noticias'

jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Ejecutar scraper
        run: node radar-engine/index.js --fuente=${{ github.event.inputs.fuente || 'noticias' }}
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_KEY: ${{ secrets.PUBLIC_SUPABASE_KEY }}

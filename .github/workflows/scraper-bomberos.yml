 name: Scraper señales jurídicas — bomberos

  "on":
    schedule:
      - cron: '0 6 * * 1'
    workflow_dispatch:

  jobs:
    scraper:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN }}
        - uses: actions/setup-node@v4
          with:
            node-version: '22'
            cache: 'npm'
        - run: npm ci
        - name: Run scraper
          env:
            PUBLIC_SUPABASE_URL:  ${{ secrets.PUBLIC_SUPABASE_URL }}
            PUBLIC_SUPABASE_KEY:  ${{ secrets.PUBLIC_SUPABASE_KEY }}
            SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
            PUBLIC_NICHO:         bomberos
          run: node scripts/scraper.js
        - name: Commit CSV
          run: |
            git config user.name "scraper-bot"
            git config user.email "scraper@firefighter.es"
            git add exports/csv/ || true
            git diff --cached --quiet || git commit -m "chore: CSV señales $(date
  +%Y-%m-%d)"
        - run: git push origin master

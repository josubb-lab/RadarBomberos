name: Scraper bomberos
"on":
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run scraper
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_KEY: ${{ secrets.PUBLIC_SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PUBLIC_NICHO: bomberos
        run: node scripts/scraper.js
      - name: Commit and push
        run: |
          git config user.name "scraper-bot"
          git config user.email "scraper@firefighter.es"
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > last-scrape.txt
          git add exports/csv/ last-scrape.txt
          git commit -m "chore: scrape $(date +%Y-%m-%d)" || true
          git push origin master
